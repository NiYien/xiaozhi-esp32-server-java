# ============================================================
# 测试环境配置
# ============================================================
# 当前仅用于纯单元测试（不启动 Spring 上下文）
# 后续集成测试可在此扩展数据源、Redis mock 等配置

spring:
  # 禁用缓存
  cache:
    type: none

  # 虚拟线程（测试环境关闭）
  threads:
    virtual:
      enabled: false

# 日志配置 - 测试环境降低日志级别
logging:
  level:
    root: WARN
    com.xiaozhi: DEBUG
