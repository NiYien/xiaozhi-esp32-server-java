# ============================================================
# 开发环境配置
# ============================================================

spring:
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:13306/xiaozhi?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8&useSSL=false&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    username: xiaozhi
    password: 123456

  # Neo4j 配置
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: 12345678

# 本地环境邮箱配置
email:
  smtp:
    username: xxx
    password: xxx

dashscope:
  api:
    key: xxx

# ============================================================
# MQTT 配置（开发环境）
# Docker 环境：docker-compose up 自动启动 EMQX，broker-url 由环境变量覆盖为 tcp://emqx:1883
# 本地开发：直接连接本机 EMQX（需先启动 docker-compose 中的 emqx 服务）
# ============================================================
xiaozhi:
  mqtt:
    enabled: true
    broker-url: tcp://localhost:1883
    device-username: device
    device-password: device123
    device-endpoint: 192.168.2.4:1883

  udp:
    enabled: true
    port: 8888
    external-ip: 192.168.2.4

  # RAG 知识库（需要配置 Embedding 模型和 Redis）
  rag:
    enabled: true